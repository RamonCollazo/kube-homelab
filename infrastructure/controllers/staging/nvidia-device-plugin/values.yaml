# -- RuntimeClass for NVIDIA (provided by siderolabs/nvidia-container-toolkit-lts extension)
runtimeClassName: nvidia

# -- Only schedule on nodes with the NVIDIA Talos extension (key exists, version-agnostic)
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: extensions.talos.dev/nonfree-kmod-nvidia-lts
              operator: Exists

