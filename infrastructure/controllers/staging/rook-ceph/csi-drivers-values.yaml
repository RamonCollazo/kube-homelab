# Values mirror the live OperatorConfig/Driver specs already in the cluster so
# Helm's takeover of the orphan CRs (annotated meta.helm.sh/release-name:
# ceph-csi-drivers from a long-gone install) does not churn the spec on first
# reconcile. Per-sidecar resource limits replicate what the rook-ceph operator
# was setting previously via its now-removed csi.* values block.

operatorConfig:
  driverSpecDefaults:
    clusterName: rook-ceph
    cephFsClientType: kernel
    fsGroupPolicy: File
    deployCsiAddons: false
    enableMetadata: false
    generateOMapInfo: false
    imageSet:
      name: rook-csi-operator-image-set-configmap
    controllerPlugin:
      hostNetwork: true
      replicas: 2
      priorityClassName: system-cluster-critical
      deploymentStrategy:
        type: Recreate
    nodePlugin:
      kubeletDirPath: /var/lib/kubelet
      priorityClassName: system-node-critical
      enableSeLinuxHostMount: false

drivers:
  nfs:
    enabled: false
  nvmeof:
    enabled: false

  rbd:
    name: rook-ceph.rbd.csi.ceph.com
    fsGroupPolicy: File
    snapshotPolicy: none
    cephFsClientType: kernel
    controllerPlugin:
      hostNetwork: true
      priorityClassName: system-cluster-critical
      replicas: 2
      resources:
        plugin:
          requests: { memory: 512Mi }
          limits: { memory: 1Gi }
        provisioner:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { memory: 256Mi }
        attacher:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { memory: 256Mi }
        resizer:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { memory: 256Mi }
        snapshotter:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { memory: 256Mi }
        omapGenerator:
          requests: { cpu: 250m, memory: 512Mi }
          limits: { memory: 1Gi }
    nodePlugin:
      priorityClassName: system-node-critical
      resources:
        plugin:
          requests: { cpu: 250m, memory: 512Mi }
          limits: { memory: 1Gi }
        registrar:
          requests: { cpu: 50m, memory: 128Mi }
          limits: { memory: 256Mi }

  cephfs:
    name: rook-ceph.cephfs.csi.ceph.com
    fsGroupPolicy: File
    snapshotPolicy: none
    cephFsClientType: kernel
    controllerPlugin:
      hostNetwork: true
      priorityClassName: system-cluster-critical
      replicas: 2
      resources:
        plugin:
          requests: { memory: 512Mi }
          limits: { memory: 1Gi }
        provisioner:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { memory: 256Mi }
        attacher:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { memory: 256Mi }
        resizer:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { memory: 256Mi }
        snapshotter:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { memory: 256Mi }
    nodePlugin:
      priorityClassName: system-node-critical
      resources:
        plugin:
          requests: { cpu: 250m, memory: 512Mi }
          limits: { memory: 1Gi }
        registrar:
          requests: { cpu: 50m, memory: 128Mi }
          limits: { memory: 256Mi }
