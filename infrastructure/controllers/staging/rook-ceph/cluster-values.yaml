operatorNamespace: rook-ceph
monitoring:
  enabled: true
cephClusterSpec:
  resources:
    mon:
      requests:
        memory: "512Mi"
    osd:
      requests:
        memory: "2Gi"
cephFileSystems:
  - name: ceph-filesystem
    spec:
      metadataServer:
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
cephObjectStores:
  - name: ceph-objectstore
    spec:
      gateway:
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
