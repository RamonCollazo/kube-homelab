---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rustfs
  namespace: rustfs
spec:
  interval: 15m
  chart:
    spec:
      chart: rustfs
      version: 0.0.92
      sourceRef:
        kind: HelmRepository
        name: rustfs
        namespace: rustfs
  valuesFrom:
    - kind: ConfigMap
      name: rustfs-values
      valuesKey: values.yaml
