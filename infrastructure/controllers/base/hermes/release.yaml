apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-operator
  namespace: hermes-operator
spec:
  interval: 15m
  chart:
    spec:
      chart: hermes-operator
      # NOTE: pinned to the operator release tag. Confirm the Helm chart semver
      # matches this; adjust if the chart is versioned independently of the app.
      version: 0.1.17
      sourceRef:
        kind: HelmRepository
        name: hermes
        namespace: hermes-operator
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: hermes-values
      valuesKey: values.yaml
