apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  interval: 30m
  chart:
    spec:
      chart: cloudflared
      version: 2.2.7
      sourceRef:
        kind: HelmRepository
        name: community-charts
        namespace: cloudflared
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: cloudflared-values
      valuesKey: values.yaml
