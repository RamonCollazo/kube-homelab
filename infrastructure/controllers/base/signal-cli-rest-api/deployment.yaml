apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-cli-rest-api
  namespace: signal-cli-rest-api
  labels:
    app: signal-cli-rest-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: signal-cli-rest-api
  template:
    metadata:
      labels:
        app: signal-cli-rest-api
    spec:
      containers:
        - name: signal-cli-rest-api
          image: bbernhard/signal-cli-rest-api:0.100
          env:
            - name: MODE
              value: "json-rpc"
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /home/.local/share/signal-cli
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: signal-cli-rest-api-data
