---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
  namespace: rook-ceph
spec:
  interval: 30m
  chart:
    spec:
      chart: ceph-csi-drivers
      version: "1.0.1"
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
        namespace: rook-ceph
      interval: 12h
  dependsOn:
    - name: rook-ceph
      namespace: rook-ceph
  valuesFrom:
    - kind: ConfigMap
      name: ceph-csi-drivers-values
      valuesKey: values.yaml
