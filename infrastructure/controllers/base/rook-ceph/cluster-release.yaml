---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
  namespace: rook-ceph
spec:
  interval: 30m
  chart:
    spec:
      chart: rook-ceph-cluster
      version: "v1.19.4"
      sourceRef:
        kind: HelmRepository
        name: rook-release
        namespace: rook-ceph
      interval: 12h
  dependsOn:
    - name: rook-ceph
      namespace: rook-ceph
  valuesFrom:
    - kind: ConfigMap
      name: rook-ceph-cluster-values
      valuesKey: values.yaml
