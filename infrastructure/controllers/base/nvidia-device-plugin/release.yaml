---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
  namespace: nvidia-device-plugin
spec:
  interval: 15m
  chart:
    spec:
      chart: nvidia-device-plugin
      version: 0.19.0
      sourceRef:
        kind: HelmRepository
        name: nvidia-device-plugin
        namespace: nvidia-device-plugin
  valuesFrom:
    - kind: ConfigMap
      name: nvidia-device-plugin-values
      valuesKey: values.yaml
