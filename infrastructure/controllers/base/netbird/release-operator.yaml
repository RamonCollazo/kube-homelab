apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird-operator
  namespace: netbird
spec:
  chart:
    spec:
      chart: kubernetes-operator
      sourceRef:
        kind: HelmRepository
        name: netbirdio
        namespace: netbird
      version: 0.2.2
      interval: 12h
  interval: 30m
  values:
    netbirdAPI:
      keyFromSecret:
        name: netbird-mgmt-api-key
        key: NB_API_KEY
