apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dragonfly
  namespace: dragonfly-operator-system
spec:
  interval: 15m
  chart:
    spec:
      chart: dragonfly-operator
      version: v1.4.0
      sourceRef:
        kind: HelmRepository
        name: dragonfly
        namespace: dragonfly-operator-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: dragonfly-values
      valuesKey: values.yaml
