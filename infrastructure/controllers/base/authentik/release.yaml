apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  releaseName: authentik
  interval: 15m
  chart:
    spec:
      chart: authentik
      version: 2025.12.4
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: authentik
  valuesFrom:
    - kind: ConfigMap
      name: authentik-values
      valuesKey: values.yaml
