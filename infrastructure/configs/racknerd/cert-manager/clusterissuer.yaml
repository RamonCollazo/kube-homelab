apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: clusterissuer-racknerd
spec:
  acme:
    email: acme.fpdj9@simplelogin.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: clusterissuer-racknerd-account-key
    solvers:
      - selector:
          dnsZones:
            - "sietejoyeria.com"
        http01:
          gatewayHTTPRoute:
            parentRefs:
              - kind: Gateway
                name: https-gateway
                namespace: public-gateway
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: token
