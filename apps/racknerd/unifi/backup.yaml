---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: unifi-mongodb-backup
  namespace: mongodb
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          initContainers:
            - name: dump
              image: mongo:8.0
              command:
                - /bin/sh
                - -c
                - |
                  DATE=$(date +%Y-%m-%d)
                  echo "$DATE" > /backup/date
                  for db in unifi unifi_audit; do
                    mongodump \
                      --host=unifi-db-svc.mongodb.svc.cluster.local:27017 \
                      --username=unifi \
                      --password="$MONGO_PASSWORD" \
                      --authenticationDatabase=unifi \
                      --db="$db" \
                      --out=/backup/dump
                  done
                  tar czf /backup/unifi-$DATE.tar.gz -C /backup dump
              env:
                - name: MONGO_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: unifi-db-password
                      key: password
              volumeMounts:
                - name: backup
                  mountPath: /backup
          containers:
            - name: upload
              image: amazon/aws-cli:latest
              command:
                - /bin/sh
                - -c
                - |
                  DATE=$(cat /backup/date)
                  aws s3api put-object \
                    --endpoint-url https://rustfs-s3.raymondcollazo.com \
                    --bucket unifi-db \
                    --key unifi-$DATE.tar.gz \
                    --body /backup/unifi-$DATE.tar.gz \
                    --no-verify-ssl
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: rustfs-backup-creds
                      key: ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: rustfs-backup-creds
                      key: ACCESS_SECRET_KEY
                - name: AWS_DEFAULT_REGION
                  value: us-east-1
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              emptyDir: {}
