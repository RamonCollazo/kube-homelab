apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/wordpress/sietejoyeria/
  - configmap.yaml
  - secrets.yaml
  - route.yaml
patches:
  - path: patches.yaml
configMapGenerator:
  - name: wordpress-sietejoyeria-php-ini
    namespace: wordpress-sietejoyeria
    files:
      - uploads.ini=uploads.ini
