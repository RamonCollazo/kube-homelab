---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wordpress-sietejoyeria-env
  namespace: wordpress-sietejoyeria
data:
  WORDPRESS_DB_HOST: "wordpress-sietejoyeria-db.wordpress-sietejoyeria.svc.cluster.local"
  WORDPRESS_DB_NAME: "wordpress-sietejoyeria"
  WORDPRESS_DB_USER: "wordpress"
  WORDPRESS_TABLE_PREFIX: "wp_"
  WORDPRESS_CONFIG_EXTRA: |
    define('WP_HOME', 'https://sietejoyeria.com');
    define('WP_SITEURL', 'https://sietejoyeria.com');
    if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
        $_SERVER['HTTPS'] = 'on';
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wordpress-sietejoyeria-php-ini
  namespace: wordpress-sietejoyeria
data:
  uploads.ini: |
    upload_max_filesize = 512M
    post_max_size = 512M
    memory_limit = 256M
    max_execution_time = 300
    opcache.enable = 1
    opcache.memory_consumption = 128
    opcache.interned_strings_buffer = 8
    opcache.max_accelerated_files = 4000
    opcache.revalidate_freq = 60
    opcache.fast_shutdown = 1
