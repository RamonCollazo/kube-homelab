---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: open-webui
spec:
  interval: 15m
  chart:
    spec:
      chart: open-webui
      version: 12.10.0
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: open-webui
  valuesFrom:
    - kind: ConfigMap
      name: open-webui-values
      valuesKey: values.yaml
