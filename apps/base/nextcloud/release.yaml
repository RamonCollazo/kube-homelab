---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 15m
  chart:
    spec:
      chart: nextcloud
      version: 9.0.5
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud
  install:
    timeout: 15m
  upgrade:
    timeout: 15m
  valuesFrom:
    - kind: ConfigMap
      name: nextcloud-values
      valuesKey: values.yaml
