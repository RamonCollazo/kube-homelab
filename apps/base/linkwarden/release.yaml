---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: meilisearch
  namespace: linkwarden
spec:
  interval: 15m
  chart:
    spec:
      chart: charts/meilisearch
      version: 0.17.1
      sourceRef:
        kind: GitRepository
        name: meilisearch
        namespace: linkwarden
  valuesFrom:
    - kind: ConfigMap
      name: meilisearch-values
      valuesKey: values-meili.yaml
