---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 15m
  chart:
    spec:
      chart: immich
      version: 0.10.3
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: immich
  install:
    timeout: 15m
  upgrade:
    timeout: 15m
  valuesFrom:
    - kind: ConfigMap
      name: immich-values
      valuesKey: values.yaml
