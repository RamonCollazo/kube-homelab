---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ai
  namespace: paperless-ngx
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: paperless-ai
  template:
    metadata:
      labels:
        app: paperless-ai
    spec:
      containers:
        - name: paperless-ai
          image: docker.io/clusterzx/paperless-ai:3.0.9
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: paperless-ai-config
          env:
            - name: PAPERLESS_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: paperless-ai-secret
                  key: PAPERLESS_API_TOKEN
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-ai-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-ai
  namespace: paperless-ngx
spec:
  selector:
    app: paperless-ai
  ports:
    - port: 3000
      targetPort: 3000
