---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-tika
  namespace: paperless-ngx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperless-tika
  template:
    metadata:
      labels:
        app: paperless-tika
    spec:
      containers:
        - name: tika
          image: docker.io/apache/tika:3.2.3.0-full
          ports:
            - containerPort: 9998
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /tika
              port: 9998
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-tika
  namespace: paperless-ngx
spec:
  selector:
    app: paperless-tika
  ports:
    - port: 9998
      targetPort: 9998
