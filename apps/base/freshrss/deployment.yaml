apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: freshrss
  name: freshrss
  namespace: freshrss
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: freshrss
  template:
    metadata:
      labels:
        app: freshrss
    spec:
      initContainers:
        - name: install-extensions
          image: alpine:3
          command:
            - sh
            - -c
            - |
              apk add --no-cache unzip wget &&
              wget -O /tmp/ext.zip https://github.com/Niehztog/freshrss-af-readability/archive/refs/heads/master.zip &&
              unzip /tmp/ext.zip -d /tmp/ext &&
              cp -r /tmp/ext/freshrss-af-readability-master/. /ext/
          volumeMounts:
            - name: ext-readability
              mountPath: /ext
          securityContext:
            allowPrivilegeEscalation: false
      containers:
        - image: freshrss/freshrss:1.28.1
          imagePullPolicy: IfNotPresent
          name: freshrss
          ports:
            - containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: freshrss-data
              mountPath: /var/www/FreshRSS/data
            - name: ext-readability
              mountPath: /var/www/FreshRSS/extensions/freshrss-af-readability
          envFrom:
            - configMapRef:
                name: freshrss-env
            - secretRef:
                name: freshrss-env-secret
      volumes:
        - name: freshrss-data
          persistentVolumeClaim:
            claimName: freshrss-data
        - name: ext-readability
          emptyDir: {}
