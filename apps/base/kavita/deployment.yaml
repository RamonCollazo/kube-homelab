apiVersion: apps/v1
kind: Deployment
metadata:
  name: kavita
  namespace: kavita
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kavita
  template:
    metadata:
      labels:
        app: kavita
    spec:
      securityContext:
        fsGroup: 33
        runAsUser: 33
        runAsGroup: 33
      containers:
        - name: kavita
          image: ghcr.io/kareadita/kavita:0.9.0
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: kavita-config
              mountPath: /kavita/config
            - name: media-ebooks
              mountPath: /books
      volumes:
        - name: kavita-config
          persistentVolumeClaim:
            claimName: kavita-config-pvc
        - name: media-ebooks
          nfs:
            server: 10.0.150.100
            path: /mnt/DataVault/Media/eBooks
            readOnly: true
