---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbox
  namespace: netbox
spec:
  interval: 15m
  chart:
    spec:
      chart: netbox
      version: 8.1.2
      sourceRef:
        kind: HelmRepository
        name: netbox-community
        namespace: netbox
  install:
    timeout: 15m
  upgrade:
    timeout: 15m
  valuesFrom:
    - kind: ConfigMap
      name: netbox-values
      valuesKey: values.yaml
