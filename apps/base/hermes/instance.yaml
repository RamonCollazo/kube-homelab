apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: hermes-agent
  namespace: hermes-agent
spec:
  image:
    repository: ghcr.io/paperclipinc/hermes-agent
    tag: "v0.16.0"
  storage:
    persistence:
      enabled: true
      size: 10Gi
  config:
    raw:
      _config_version: 30
      provider: openai-codex
      model: gpt-5.5
