apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  interval: 15m
  chart:
    spec:
      chart: forgejo
      version: 16.2.0
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: forgejo
  install:
    timeout: 15m
  upgrade:
    timeout: 15m
  valuesFrom:
    - kind: ConfigMap
      name: forgejo-values
      valuesKey: values.yaml
