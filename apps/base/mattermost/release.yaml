---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mattermost
  namespace: mattermost
spec:
  interval: 15m
  chart:
    spec:
      chart: mattermost-team-edition
      version: 6.6.94
      sourceRef:
        kind: HelmRepository
        name: mattermost
        namespace: mattermost
  valuesFrom:
    - kind: ConfigMap
      name: mattermost-values
      valuesKey: values.yaml
    - kind: Secret
      name: mattermost-db-values
      valuesKey: values.yaml
