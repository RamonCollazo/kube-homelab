nextcloud:
  host: nextcloud.raymondcollazo.com
  existingSecret:
    enabled: true
    secretName: nextcloud-admin
    usernameKey: adminUser
    passwordKey: adminPassword
  trustedDomains:
    - nextcloud.raymondcollazo.com
  configs:
    proxy.config.php: |-
      <?php
      $CONFIG = array(
        'overwriteprotocol' => 'https',
        'overwrite.cli.url' => 'https://nextcloud.raymondcollazo.com',
        'trusted_proxies' => array('10.244.0.0/16'),
        'allow_local_remote_servers' => true,
      );
  extraEnv:
    - name: REDIS_HOST
      value: nextcloud-ds
    - name: REDIS_HOST_PORT
      value: "6379"
    - name: OIDC_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: nextcloud-oidc
          key: clientID
    - name: OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: nextcloud-oidc
          key: clientSecret

lifecycle:
  postStartCommand:
    - /bin/sh
    - -c
    - |
      php occ app:install user_oidc --keep-disabled || true
      php occ app:enable user_oidc || true
      php occ user_oidc:provider authentik \
        --clientid="$OIDC_CLIENT_ID" \
        --clientsecret="$OIDC_CLIENT_SECRET" \
        --discoveryuri="https://auth.raymondcollazo.com/application/o/nextcloud/.well-known/openid-configuration" \
        --scope="email profile openid" \
        --unique-uid=0 \
        --mapping-uid="preferred_username" || true
      php occ config:app:set user_oidc allow_multiple_user_backends --value=0 || true

internalDatabase:
  enabled: false

externalDatabase:
  enabled: true
  type: postgresql
  existingSecret:
    enabled: true
    secretName: nextcloud-database-app
    hostKey: host
    usernameKey: user
    passwordKey: password
    databaseKey: dbname

redis:
  enabled: false

persistence:
  enabled: true
  storageClass: ceph-block
  accessMode: ReadWriteOnce
  size: 5Gi
  nextcloudData:
    enabled: true
    existingClaim: nextcloud-data-pvc
    accessMode: ReadWriteMany

cronjob:
  enabled: true
  type: cronjob
  cronjob:
    schedule: "*/5 * * * *"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    backoffLimit: 1
    securityContext:
      runAsUser: 33
      runAsGroup: 33

startupProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
  successThreshold: 1

resources:
  limits:
    cpu: "4"
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: false
