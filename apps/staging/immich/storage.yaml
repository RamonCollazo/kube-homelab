---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-library-pv
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: 10.0.150.100
    path: /mnt/DataVault/Immich
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    name: immich-library-pvc
    namespace: immich
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-library-pvc
  namespace: immich
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 500Gi
  volumeName: immich-library-pv
  storageClassName: ""
