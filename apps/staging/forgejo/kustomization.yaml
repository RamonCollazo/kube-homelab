apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: forgejo
resources:
  - ../../base/forgejo/
  - ./database.yaml
  - ./datastore.yaml
  - ./route.yaml
  - ./secrets.yaml
  - ./scheduled-backup.yaml
configurations:
  - kustomizeconfig.yaml
configMapGenerator:
  - name: forgejo-values
    files:
      - values.yaml=values.yaml
