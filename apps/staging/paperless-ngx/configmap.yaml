---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paperless-ngx-config
  namespace: paperless-ngx
data:
  PAPERLESS_URL: "https://paperless.raymondcollazo.com"
  PAPERLESS_DBENGINE: "postgresql"
  PAPERLESS_DBHOST: "paperless-database-rw"
  PAPERLESS_DBNAME: "paperless"
  PAPERLESS_DBUSER: "paperless"
  PAPERLESS_REDIS: "redis://paperless-ds:6379"
  PAPERLESS_TIKA_ENABLED: "1"
  PAPERLESS_TIKA_ENDPOINT: "http://paperless-tika:9998"
  PAPERLESS_TIKA_GOTENBERG_ENDPOINT: "http://paperless-gotenberg:3000"
  PAPERLESS_APPS: "allauth.socialaccount.providers.openid_connect"
  PAPERLESS_TRUSTED_PROXIES: "10.244.0.0/16"
  PAPERLESS_TIME_ZONE: "America/Puerto_Rico"
  PAPERLESS_OCR_LANGUAGE: "eng"
  PAPERLESS_CONSUMER_POLLING: "60"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paperless-ai-config
  namespace: paperless-ngx
data:
  PAPERLESS_API_URL: "http://paperless-ngx.paperless-ngx.svc.cluster.local:8000"
  AI_PROVIDER: "ollama"
  OLLAMA_API_URL: "http://open-webui-ollama.open-webui.svc.cluster.local:11434"
  OLLAMA_MODEL: "qwen2.5:1.5b"
  SCAN_INTERVAL: "*/30 * * * *"
  ADD_AI_PROCESSED_TAG: "true"
  AI_PROCESSED_TAG_NAME: "ai-processed"
  USE_PROMPT_TAGS: "true"
  PAPERLESS_AI_PORT: "3000"
  PUID: "1000"
  PGID: "1000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paperless-gpt-config
  namespace: paperless-ngx
data:
  PAPERLESS_BASE_URL: "http://paperless-ngx.paperless-ngx.svc.cluster.local:8000"
  LLM_PROVIDER: "ollama"
  LLM_MODEL: "qwen2.5:1.5b"
  OLLAMA_HOST: "http://open-webui-ollama.open-webui.svc.cluster.local:11434"
  OLLAMA_CONTEXT_LENGTH: "8192"
  TOKEN_LIMIT: "1000"
  LLM_LANGUAGE: "English"
  LOG_LEVEL: "info"
