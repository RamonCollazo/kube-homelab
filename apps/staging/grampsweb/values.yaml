gramps:
  tree: "collazo"
  baseURL: "https://grampsweb.raymondcollazo.com"
  mediaPrefixTree: true
  registrationDisabled: true
  disableTelemetry: true

podSecurityContext:
  fsGroup: 2000

securityContext: {}

resources:
  limits:
    cpu: 1000m
    memory: 1536Mi
  requests:
    cpu: 100m
    memory: 512Mi

persistence:
  enabled: true
  storageClass: ceph-block
  accessMode: ReadWriteOnce
  size: 5Gi

volumes:
  - name: gramps-config-file
    secret:
      secretName: grampsweb-config
      optional: false

volumeMounts:
  - name: gramps-config-file
    mountPath: "/app/config/config.cfg"
    subPath: config.cfg
    readOnly: true
