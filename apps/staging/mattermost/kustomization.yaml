apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mattermost
resources:
  - ../../base/mattermost/
  - ./database.yaml
  - ./secrets.yaml
  - ./route.yaml
  - ./scheduled-backup.yaml

configurations:
  - kustomizeconfig.yaml

configMapGenerator:
  - name: mattermost-values
    files:
      - values.yaml=values.yaml
