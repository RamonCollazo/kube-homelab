---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mattermost
  namespace: mattermost
spec:
  parentRefs:
    - name: lan-gateway
      namespace: lan-gateway
      sectionName: lan-https
    - name: lan-gateway
      namespace: lan-gateway
      sectionName: lan-http
  hostnames:
    - "mattermost.raymondcollazo.com"
  rules:
    - backendRefs:
        - name: mattermost-team-edition
          port: 8065
