apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/jellyfin/
  - ./route.yaml
  - ./secrets.yaml
  - ./zap2xml-pvc.yaml
  - ./zap2xml-deployment.yaml

configurations:
  - kustomizeconfig.yaml

configMapGenerator:
  - name: jellyfin-values
    namespace: jellyfin
    files:
      - values.yaml=values.yaml
