persistence:
  config:
    enabled: true
    accessMode: ReadWriteOnce
    size: 5Gi
  media:
    enabled: false

volumes:
  - name: media-movies
    nfs:
      server: 10.0.150.100
      path: /mnt/DataVault/Media/Movies
      readOnly: false
  - name: media-series
    nfs:
      server: 10.0.150.100
      path: /mnt/DataVault/Media/Series
      readOnly: false
  - name: epg
    persistentVolumeClaim:
      claimName: zap2xml-epg

volumeMounts:
  - name: media-movies
    mountPath: /media/Movies
  - name: media-series
    mountPath: /media/Series
  - name: epg
    mountPath: /epg

deploymentStrategy:
  type: Recreate

runtimeClassName: nvidia

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 4000m
    memory: 4Gi
    nvidia.com/gpu: 1

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  failureThreshold: 10
  timeoutSeconds: 5
  periodSeconds: 10

ingress:
  enabled: false

httpRoute:
  enabled: false

extraInitContainers:
  - name: install-sso-plugin
    image: alpine:3.23
    command:
      - sh
      - -c
      - |
        set -e

        PLUGIN_DIR="/config/plugins/sso-authentication_4.0.0.3"
        CONFIG_FILE="/config/plugins/configurations/SSO-Auth.xml"

        if [ ! -f "${PLUGIN_DIR}/SSO-Auth.dll" ]; then
          mkdir -p "${PLUGIN_DIR}"
          wget -q -O /tmp/sso.zip \
            https://github.com/9p4/jellyfin-plugin-sso/releases/download/v4.0.0.3/sso-authentication_4.0.0.3.zip
          unzip -q /tmp/sso.zip -d "${PLUGIN_DIR}"
          rm /tmp/sso.zip
        fi

        mkdir -p /config/plugins/configurations
        cat > "${CONFIG_FILE}" << XMLEOF
        <?xml version="1.0" encoding="utf-8"?>
        <PluginConfiguration xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
          <SamlConfigs />
          <OidConfigs>
            <item>
              <key>
                <string>Authentik</string>
              </key>
              <value>
                <PluginConfiguration>
                  <OidEndpoint>https://auth.raymondcollazo.com/application/o/jellyfin/</OidEndpoint>
                  <OidClientId>${OIDC_CLIENT_ID}</OidClientId>
                  <OidSecret>${OIDC_CLIENT_SECRET}</OidSecret>
                  <Enabled>true</Enabled>
                  <EnableAuthorization>false</EnableAuthorization>
                  <EnableAllFolders>true</EnableAllFolders>
                  <EnabledFolders />
                  <AdminRoles />
                  <Roles />
                  <EnableFolderRoles>false</EnableFolderRoles>
                  <EnableLiveTvRoles>false</EnableLiveTvRoles>
                  <EnableLiveTv>true</EnableLiveTv>
                  <EnableLiveTvManagement>true</EnableLiveTvManagement>
                  <LiveTvRoles />
                  <LiveTvManagementRoles />
                  <FolderRoleMappings />
                  <OidScopes />
                  <SchemeOverride>https</SchemeOverride>
                  <PortOverride xsi:nil="true" />
                  <NewPath>false</NewPath>
                  <CanonicalLinks />
                  <DisableHttps>false</DisableHttps>
                  <DisablePushedAuthorization>false</DisablePushedAuthorization>
                  <DoNotValidateEndpoints>false</DoNotValidateEndpoints>
                  <DoNotValidateIssuerName>false</DoNotValidateIssuerName>
                </PluginConfiguration>
              </value>
            </item>
          </OidConfigs>
        </PluginConfiguration>
        XMLEOF
    env:
      - name: OIDC_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: jellyfin-oidc
            key: client-id
      - name: OIDC_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: jellyfin-oidc
            key: client-secret
    volumeMounts:
      - name: config
        mountPath: /config
