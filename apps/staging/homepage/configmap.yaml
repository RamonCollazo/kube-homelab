apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
    gateway: true
  settings.yaml: |
    title: Homelab
    theme: dark
    color: slate
    headerStyle: boxed
    background:
      image: https://w.wallhaven.cc/full/d8/wallhaven-d86673.jpg
      blur: sm
      opacity: 30
    layout:
      Apps:
        style: column
      Dev Tools:
        style: column
      Monitoring:
        style: column
      Security:
        style: column
      Infrastructure:
        style: column
      Networking:
        style: column
      Management:
        style: column
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - GitHub:
            - abbr: GH
              href: https://github.com/
        - kube-homelab:
            - abbr: KH
              href: https://github.com/RamonCollazo/kube-homelab
  services.yaml: |
    - Apps:
        - ActualBudget:
            href: https://actual.raymondcollazo.com
            description: Personal finance and budgeting
            icon: actual-budget.png
        - FreshRSS:
            href: https://freshrss.raymondcollazo.com
            description: RSS aggregator and reader
            icon: freshrss.png
        - GrampsWeb:
            href: https://grampsweb.raymondcollazo.com
            description: Genealogy web frontend
            icon: gramps.png
        - Kavita:
            href: https://kavita.raymondcollazo.com
            description: Digital library for manga, comics, and books
            icon: kavita.png
        - Kiwix:
            href: https://kiwix.raymondcollazo.com
            description: Offline reader for Wikipedia and ZIM content
            icon: kiwix.png
        - Linkwarden:
            href: https://linkwarden.raymondcollazo.com
            description: Collaborative bookmark manager
            icon: linkwarden.png

    - Dev Tools:
        - Forgejo:
            href: https://forgejo.raymondcollazo.com
            description: Self-hosted Git forge
            icon: forgejo.png
        - Mattermost:
            href: https://mattermost.raymondcollazo.com
            description: Team messaging and collaboration
            icon: mattermost.png
        - n8n:
            href: https://n8n.raymondcollazo.com
            description: Workflow automation
            icon: n8n.png
        - NetBox:
            href: https://netbox.raymondcollazo.com
            description: Network source of truth
            icon: netbox.png
        - Open WebUI:
            href: https://open-webui.raymondcollazo.com
            description: AI chat interface with GPU acceleration
            icon: open-webui.png

    - Monitoring:
        - Grafana:
            href: https://grafana.raymondcollazo.com
            description: Metrics and observability dashboards
            icon: grafana.png
        - Hubble:
            href: https://hubble.raymondcollazo.com
            description: Cilium network observability
            icon: si-cilium

    - Security:
        - Authentik:
            href: https://auth.raymondcollazo.com
            description: SSO and identity provider
            icon: authentik.png

    - Infrastructure:
        - RackNerd:
            href: https://my.racknerd.com/index.php?rp=/login
            description: VPS management portal
            icon: mdi-server

    - Networking:
        - OPNsense:
            href: https://opnsense.bayamon.lan/
            description: Firewall and network management
            icon: opnsense.png

    - Management:
        - Omni:
            href: https://raymondcollazo.na-west-1.omni.siderolabs.io/
            description: Talos Linux cluster management
            icon: mdi-kubernetes
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: false
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
