apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
    gateway: true
  settings.yaml: |
    title: Homelab
    theme: dark
    color: zinc
    headerStyle: boxed
    background:
      image: https://w.wallhaven.cc/full/d8/wallhaven-d86673.jpg
      blur: sm
      opacity: 20
    layout:
      Management:
        style: column
      Networking:
        style: column
      Infrastructure:
        style: column
      Monitoring:
        style: column
      Dev Tools:
        style: column
      Apps:
        style: column
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Repositories:
        - kube-homelab:
            - href: https://github.com/RamonCollazo/kube-homelab
              icon: github.png
        - learning-lab:
            - href: https://github.com/RamonCollazo/learning-lab
              icon: github.png
        - devops-best-practices:
            - href: https://github.com/RamonCollazo/devops-best-practices
              icon: github.png

    - Cloud Platforms:
        - GreenCloud VPS:
            - href: https://greencloudvps.com/billing/login
              icon: https://cdn.brandfetch.io/id0SQOHn0d/w/2048/h/2048/theme/dark/icon.jpeg?c=1bxid64Mup7aczewSAYMX&t=1768745422984
        - RackNerd:
            - href: https://my.racknerd.com/index.php?rp=/login
              icon: racknerd-dark.png

    - Cloud Services:
        - Cloudflare:
            - href: https://dash.cloudflare.com/
              icon: cloudflare.png
        - Netbird:
            - href: https://app.netbird.io/
              icon: netbird.png
  services.yaml: |
    - Management:
        - Omni:
            href: https://raymondcollazo.na-west-1.omni.siderolabs.io/
            description: Talos Linux cluster management
            icon: talos.png
            siteMonitor: https://raymondcollazo.na-west-1.omni.siderolabs.io/

    - Networking:
        - OPNsense:
            href: https://opnsense.bayamon.lan/
            description: Firewall and network management
            icon: opnsense.png
            ping: https://opnsense.bayamon.lan/
        - Unifi:
            href: https://unifi.raymondcollazo.com/
            description: Unifi network application portal
            icon: unifi.png
            ping: https://unifi.raymondcollazo.com/

    - Infrastructure:
        - Authentik:
            href: https://auth.raymondcollazo.com
            description: SSO and identity provider
            icon: authentik.png
            siteMonitor: https://auth.raymondcollazo.com
        - RustFS:
            href: https://rustfs.raymondcollazo.com
            description: S3-compatible object storage for backups
            icon: minio.png
            siteMonitor: https://rustfs.raymondcollazo.com

    - Monitoring:
        - Grafana:
            href: https://grafana.raymondcollazo.com
            description: Metrics and observability dashboards
            icon: grafana.png
            siteMonitor: https://grafana.raymondcollazo.com
        - Hubble:
            href: https://hubble.raymondcollazo.com
            description: Cilium network observability
            icon: cilium.png
            siteMonitor: https://hubble.raymondcollazo.com

    - Dev Tools:
        - Forgejo:
            href: https://forgejo.raymondcollazo.com
            description: Self-hosted Git forge
            icon: forgejo.png
            siteMonitor: https://forgejo.raymondcollazo.com
        - Mattermost:
            href: https://mattermost.raymondcollazo.com
            description: Team messaging and collaboration
            icon: mattermost.png
            siteMonitor: https://mattermost.raymondcollazo.com
        - n8n:
            href: https://n8n.raymondcollazo.com
            description: Workflow automation
            icon: n8n.png
            siteMonitor: https://n8n.raymondcollazo.com
        - NetBox:
            href: https://netbox.raymondcollazo.com
            description: Network source of truth
            icon: netbox.png
            siteMonitor: https://netbox.raymondcollazo.com
        - Open WebUI:
            href: https://open-webui.raymondcollazo.com
            description: AI chat interface with GPU acceleration
            icon: open-webui.png
            siteMonitor: https://open-webui.raymondcollazo.com

    - Apps:
        - ActualBudget:
            href: https://actual.raymondcollazo.com
            description: Personal finance and budgeting
            icon: actual-budget.png
            siteMonitor: https://actual.raymondcollazo.com
        - FreshRSS:
            href: https://freshrss.raymondcollazo.com
            description: RSS aggregator and reader
            icon: freshrss.png
            siteMonitor: https://freshrss.raymondcollazo.com
        - GrampsWeb:
            href: https://grampsweb.raymondcollazo.com
            description: Genealogy web frontend
            icon: gramps.png
            siteMonitor: https://grampsweb.raymondcollazo.com
        - Immich:
            href: https://immich.raymondcollazo.com
            description: Self-hosted photo and video backup
            icon: immich.png
            siteMonitor: https://immich.raymondcollazo.com
        - Kavita:
            href: https://kavita.raymondcollazo.com
            description: Digital library for manga, comics, and books
            icon: kavita.png
            siteMonitor: https://kavita.raymondcollazo.com
        - Kiwix:
            href: https://kiwix.raymondcollazo.com
            description: Offline reader for Wikipedia and ZIM content
            icon: kiwix.png
            siteMonitor: https://kiwix.raymondcollazo.com
        - Linkwarden:
            href: https://linkwarden.raymondcollazo.com
            description: Collaborative bookmark manager
            icon: linkwarden.png
            siteMonitor: https://linkwarden.raymondcollazo.com
        - SmartrEnergy:
            href: https://smartrenergy.com/
            description: WordPress-based capstone portfolio site
            icon: wordpress.png
            siteMonitor: https://smartrenergy.com/

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: false
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
