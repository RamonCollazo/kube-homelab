apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/homepage/
  # - ./certificate.yaml
  - ./configmap.yaml
  # - ./gateway.yaml
  - ./route.yaml
  - ./secrets.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: homepage
        namespace: homepage
      spec:
        template:
          spec:
            containers:
              - name: homepage
                envFrom:
                  - secretRef:
                      name: grafana-token
    target:
      kind: Deployment
      name: homepage
