apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hermes-agent-ramon
resources:
  - ../../../base/hermes/
  - ./secret.yaml
patches:
  - target:
      kind: HermesInstance
      name: hermes-agent
    patch: |
      - op: replace
        path: /metadata/name
        value: hermes-agent-ramon
      - op: add
        path: /spec/env
        value:
          - name: SIGNAL_HTTP_URL
            value: http://signal-cli.signal-cli.svc.cluster.local:8080
          - name: SIGNAL_REQUIRE_MENTION
            value: "false"
      - op: add
        path: /spec/envFrom
        value:
          - secretRef:
              name: hermes-agent-ramon-secrets
      - op: add
        path: /spec/security
        value:
          networkPolicy:
            additionalEgress:
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: signal-cli
                ports:
                  - port: 8080
                    protocol: TCP
