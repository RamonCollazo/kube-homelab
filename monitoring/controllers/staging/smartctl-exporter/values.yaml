config:
  device_include: "/dev/nvme.*"
  collect_not_more_than_period: 120s

serviceMonitor:
  enabled: true
  interval: 60s
  scrapeTimeout: 30s

prometheusRules:
  enabled: true

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
